<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Library Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Mobile Overlay -->
    <div id="mobileOverlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar w-64 p-4 flex flex-col">
            <div class="flex items-center gap-3 px-3 py-3 mb-6">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--primary);">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                </div>
                <div>
                    <h1 class="font-bold text-gray-900 text-sm">LMS Admin</h1>
                    <p class="text-gray-400 text-xs">Library Management</p>
                </div>
            </div>

            <nav class="flex-1 space-y-1">
                <a href="dashboard.html" class="sidebar-link active">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Dashboard
                </a>
                <a href="books.html" class="sidebar-link">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    Manage Books
                </a>
                <a href="students.html" class="sidebar-link">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    Students
                </a>
            </nav>

            <div class="border-t border-gray-100 pt-4 mt-4">
                <div class="flex items-center gap-3 px-3 mb-3">
                    <div class="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background: var(--primary);">
                        <span id="adminInitial">A</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-gray-900 truncate" id="adminName">Admin</p>
                        <p class="text-xs text-gray-400">Administrator</p>
                    </div>
                </div>
                <button onclick="Auth.logout()" class="sidebar-link danger w-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0">
            <!-- Top Header -->
            <header class="top-header">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-100 rounded-lg">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <div class="search-box">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" placeholder="Search books..." onkeydown="if(event.key==='Enter'){window.location.href='books.html?search='+encodeURIComponent(this.value)}">
                </div>
                <div class="flex items-center gap-3">
                    <button class="p-2 hover:bg-gray-100 rounded-lg relative">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <div class="flex items-center gap-2 pl-3 border-l border-gray-200">
                        <div class="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background: var(--primary);">
                            <span id="headerInitial">A</span>
                        </div>
                        <div class="hidden sm:block">
                            <p class="text-sm font-medium text-gray-900" id="headerName">Admin</p>
                            <p class="text-xs text-gray-400">Admin</p>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="flex-1 p-6 lg:p-8">
                <div class="mb-6 animate-fade-in">
                    <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
                    <p class="text-gray-500 mt-1 text-sm">Home / Dashboard</p>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                    <div class="stat-card animate-slide-up" style="animation-delay: 0.1s">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-500">Total Books</p>
                                <p class="text-2xl font-bold text-gray-900 mt-1" id="totalBooks">0</p>
                            </div>
                            <div class="stat-card-icon bg-purple-100">
                                <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                            </div>
                        </div>
                    </div>
                    <div class="stat-card animate-slide-up" style="animation-delay: 0.15s">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-500">Issued Books</p>
                                <p class="text-2xl font-bold text-orange-600 mt-1" id="issuedBooks">0</p>
                            </div>
                            <div class="stat-card-icon bg-orange-100">
                                <svg class="w-6 h-6 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                            </div>
                        </div>
                    </div>
                    <div class="stat-card animate-slide-up" style="animation-delay: 0.2s">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-500">Returned</p>
                                <p class="text-2xl font-bold text-emerald-600 mt-1" id="returnedBooks">0</p>
                            </div>
                            <div class="stat-card-icon bg-emerald-100">
                                <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </div>
                        </div>
                    </div>
                    <div class="stat-card animate-slide-up" style="animation-delay: 0.25s">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm text-gray-500">Students</p>
                                <p class="text-2xl font-bold text-pink-600 mt-1" id="totalStudents">0</p>
                            </div>
                            <div class="stat-card-icon bg-pink-100">
                                <svg class="w-6 h-6 text-pink-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recent Issued Books -->
                <div class="table-container animate-slide-up" style="animation-delay: 0.3s">
                    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                        <h2 class="font-bold text-gray-900">Recently Issued Books</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Student</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Book</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Borrow Date</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Return Date</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Status</th>
                                </tr>
                            </thead>
                            <tbody id="recentBorrows" class="divide-y divide-gray-50"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/store.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        if (!Auth.requireAuth('admin')) throw new Error('Unauthorized');

        const session = Auth.getSession();
        document.getElementById('adminName').textContent = session.name;
        document.getElementById('adminInitial').textContent = session.name.charAt(0);
        document.getElementById('headerName').textContent = session.name;
        document.getElementById('headerInitial').textContent = session.name.charAt(0);

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mobileOverlay').classList.toggle('show');
        }

        function loadDashboard() {
            const stats = Store.getStats();
            document.getElementById('totalBooks').textContent = stats.totalBooks;
            document.getElementById('issuedBooks').textContent = stats.issuedBooks;
            document.getElementById('returnedBooks').textContent = stats.returnedBooks;
            document.getElementById('totalStudents').textContent = stats.totalStudents;

            const borrows = Store.getBorrows().sort((a, b) => new Date(b.borrowDate) - new Date(a.borrowDate)).slice(0, 5);
            const tbody = document.getElementById('recentBorrows');

            if (borrows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-12 text-center text-gray-400">No borrow records yet.</td></tr>';
                return;
            }

            const thumbColors = ['#7C3AED', '#2563EB', '#059669', '#D97706', '#DC2626'];
            tbody.innerHTML = borrows.map((b, i) => {
                const student = Store.getStudents().find(s => s.studentId === b.studentId);
                return `<tr>
                    <td class="px-6 py-3 text-sm text-gray-800 font-medium">${student ? student.name : b.studentId}</td>
                    <td class="px-6 py-3 text-sm text-gray-600">${b.bookTitle}</td>
                    <td class="px-6 py-3 text-sm text-gray-500">${new Date(b.borrowDate).toLocaleDateString()}</td>
                    <td class="px-6 py-3 text-sm text-gray-500">${new Date(b.returnDate).toLocaleDateString()}</td>
                    <td class="px-6 py-3"><span class="badge ${b.status === 'borrowed' ? 'badge-orange' : 'badge-green'}">${b.status}</span></td>
                </tr>`;
            }).join('');
        }

        loadDashboard();
    </script>
</body>
</html>

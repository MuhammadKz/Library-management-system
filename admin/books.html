<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books - Library Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="mobileOverlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar w-64 p-4 flex flex-col">
            <div class="flex items-center gap-3 px-3 py-3 mb-6">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--primary);">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                </div>
                <div>
                    <h1 class="font-bold text-gray-900 text-sm">LMS Admin</h1>
                    <p class="text-gray-400 text-xs">Library Management</p>
                </div>
            </div>
            <nav class="flex-1 space-y-1">
                <a href="dashboard.html" class="sidebar-link">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Dashboard
                </a>
                <a href="books.html" class="sidebar-link active">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    Manage Books
                </a>
                <a href="students.html" class="sidebar-link">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    Students
                </a>
            </nav>
            <div class="border-t border-gray-100 pt-4 mt-4">
                <button onclick="Auth.logout()" class="sidebar-link danger w-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0">
            <!-- Top Header -->
            <header class="top-header">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-100 rounded-lg">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <div class="search-box">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="headerSearch" placeholder="What do you want to find?" oninput="filterFromHeader()">
                </div>
                <div class="flex items-center gap-3">
                    <button class="p-2 hover:bg-gray-100 rounded-lg relative">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <div class="flex items-center gap-2 pl-3 border-l border-gray-200">
                        <div class="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background: var(--primary);">A</div>
                        <div class="hidden sm:block">
                            <p class="text-sm font-medium text-gray-900">Admin</p>
                            <p class="text-xs text-gray-400">Admin</p>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <main class="flex-1 p-6 lg:p-8">
                <div class="flex items-center justify-between mb-6 animate-fade-in">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">Library Books</h1>
                        <p class="text-gray-500 mt-1 text-sm">Home / Library Books</p>
                    </div>
                    <button onclick="openAddModal()" class="btn-primary flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Add Library
                    </button>
                </div>

                <!-- Search & Filter Bar -->
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-4 animate-slide-up" style="animation-delay: 0.1s">
                    <h2 class="text-lg font-bold text-gray-900">All Books</h2>
                    <div class="flex items-center gap-3 w-full sm:w-auto">
                        <div class="relative flex-1 sm:flex-initial">
                            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                            <input type="text" id="searchInput" placeholder="Search by name or id..."
                                class="pl-10 w-full sm:w-64" oninput="filterBooks()">
                        </div>
                    </div>
                </div>

                <!-- Books Table -->
                <div class="table-container animate-slide-up" style="animation-delay: 0.2s">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr>
                                    <th class="px-6 py-3 text-left"><input type="checkbox" class="custom-checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Book Name</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Writer</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Id</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Subject</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Available</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Action</th>
                                </tr>
                            </thead>
                            <tbody id="booksTable" class="divide-y divide-gray-50"></tbody>
                        </table>
                    </div>
                    <!-- Pagination -->
                    <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between">
                        <p class="text-sm text-gray-500" id="pageInfo">Showing 1-10 of 10</p>
                        <div class="pagination" id="pagination"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="bookModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                <h3 class="font-bold text-gray-900 text-lg" id="modalTitle">Add New Book</h3>
                <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="bookForm" class="p-6 space-y-4">
                <input type="hidden" id="bookId">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Title</label>
                    <input type="text" id="bookTitle" required placeholder="Enter book title">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Author</label>
                    <input type="text" id="bookAuthor" required placeholder="Enter author name">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Category</label>
                        <select id="bookCategory">
                            <option value="Computer Science">Computer Science</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Science">Science</option>
                            <option value="Software Engineering">Software Engineering</option>
                            <option value="Literature">Literature</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Quantity</label>
                        <input type="number" id="bookQuantity" min="1" value="1" required>
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="btn-primary flex-1">Save Book</button>
                    <button type="button" onclick="closeModal()" class="btn-secondary flex-1">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="../js/store.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        if (!Auth.requireAuth('admin')) throw new Error('Unauthorized');

        let currentPage = 1;
        const rowsPerPage = 10;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mobileOverlay').classList.toggle('show');
        }

        function toggleAll(source) {
            document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = source.checked);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast';
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        const thumbColors = ['#7C3AED', '#2563EB', '#059669', '#D97706', '#DC2626', '#EC4899'];

        function renderBooks(books) {
            const tbody = document.getElementById('booksTable');
            const totalPages = Math.ceil(books.length / rowsPerPage);
            const start = (currentPage - 1) * rowsPerPage;
            const pageBooks = books.slice(start, start + rowsPerPage);

            if (pageBooks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-gray-400">No books found.</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                document.getElementById('pageInfo').textContent = 'No results';
                return;
            }

            const categoryColors = {
                'Computer Science': 'badge-purple',
                'Mathematics': 'badge-blue',
                'Science': 'badge-green',
                'Software Engineering': 'badge-orange',
                'Literature': 'badge-pink',
                'Others': 'badge-gray'
            };

            tbody.innerHTML = pageBooks.map((b, i) => `<tr>
                <td class="px-6 py-3"><input type="checkbox" class="custom-checkbox row-checkbox"></td>
                <td class="px-6 py-3">
                    <div class="flex items-center gap-3">
                        <div class="book-thumb" style="background: ${thumbColors[b.id % thumbColors.length]}">${b.title.charAt(0)}</div>
                        <span class="text-sm font-medium text-gray-900">${b.title}</span>
                    </div>
                </td>
                <td class="px-6 py-3 text-sm text-gray-600">${b.author}</td>
                <td class="px-6 py-3 text-sm text-gray-500">#${String(b.id).padStart(5, '0')}</td>
                <td class="px-6 py-3"><span class="badge ${categoryColors[b.category] || 'badge-gray'}">${b.category}</span></td>
                <td class="px-6 py-3 text-sm font-semibold ${b.available > 0 ? 'text-emerald-600' : 'text-red-500'}">${b.available}</td>
                <td class="px-6 py-3">
                    <div class="flex items-center gap-2">
                        <button onclick="deleteBook(${b.id})" class="p-1.5 hover:bg-red-50 rounded-lg text-gray-400 hover:text-red-500 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                        <button onclick="openEditModal(${b.id})" class="p-1.5 hover:bg-purple-50 rounded-lg text-gray-400 hover:text-purple-600 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        </button>
                    </div>
                </td>
            </tr>`).join('');

            // Pagination
            document.getElementById('pageInfo').textContent = `Showing ${start + 1}-${Math.min(start + rowsPerPage, books.length)} of ${books.length}`;
            const pagination = document.getElementById('pagination');
            let paginationHTML = `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>&laquo;</button>`;
            for (let i = 1; i <= totalPages; i++) {
                paginationHTML += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            paginationHTML += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>&raquo;</button>`;
            pagination.innerHTML = paginationHTML;
        }

        function goToPage(page) {
            const books = filteredBooks || Store.getBooks();
            const totalPages = Math.ceil(books.length / rowsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderBooks(books);
        }

        let filteredBooks = null;

        function loadBooks() { filteredBooks = null; currentPage = 1; renderBooks(Store.getBooks()); }

        function filterBooks() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.getElementById('headerSearch').value = document.getElementById('searchInput').value;
            filteredBooks = Store.getBooks().filter(b =>
                b.title.toLowerCase().includes(query) ||
                b.author.toLowerCase().includes(query) ||
                b.category.toLowerCase().includes(query)
            );
            currentPage = 1;
            renderBooks(filteredBooks);
        }

        function filterFromHeader() {
            const query = document.getElementById('headerSearch').value.toLowerCase();
            document.getElementById('searchInput').value = document.getElementById('headerSearch').value;
            filteredBooks = Store.getBooks().filter(b =>
                b.title.toLowerCase().includes(query) ||
                b.author.toLowerCase().includes(query) ||
                b.category.toLowerCase().includes(query)
            );
            currentPage = 1;
            renderBooks(filteredBooks);
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add New Book';
            document.getElementById('bookForm').reset();
            document.getElementById('bookId').value = '';
            document.getElementById('bookModal').classList.remove('hidden');
        }

        function openEditModal(id) {
            const book = Store.getBookById(id);
            if (!book) return;
            document.getElementById('modalTitle').textContent = 'Edit Book';
            document.getElementById('bookId').value = book.id;
            document.getElementById('bookTitle').value = book.title;
            document.getElementById('bookAuthor').value = book.author;
            document.getElementById('bookCategory').value = book.category;
            document.getElementById('bookQuantity').value = book.quantity;
            document.getElementById('bookModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('bookModal').classList.add('hidden'); }

        function deleteBook(id) {
            if (confirm('Are you sure you want to delete this book?')) {
                Store.deleteBook(id);
                loadBooks();
                showToast('Book deleted successfully.');
            }
        }

        document.getElementById('bookForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('bookId').value;
            const data = {
                title: document.getElementById('bookTitle').value,
                author: document.getElementById('bookAuthor').value,
                category: document.getElementById('bookCategory').value,
                quantity: parseInt(document.getElementById('bookQuantity').value)
            };

            if (id) {
                const book = Store.getBookById(parseInt(id));
                Store.updateBook(parseInt(id), { ...data, available: book.available + (data.quantity - book.quantity) });
                showToast('Book updated successfully.');
            } else {
                Store.addBook(data);
                showToast('Book added successfully.');
            }
            closeModal();
            loadBooks();
        });

        // Check for search query in URL
        const urlParams = new URLSearchParams(window.location.search);
        const searchQuery = urlParams.get('search');
        if (searchQuery) {
            document.getElementById('headerSearch').value = searchQuery;
            filterFromHeader();
        } else {
            loadBooks();
        }
    </script>
</body>
</html>

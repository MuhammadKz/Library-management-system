<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management - Library Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="mobileOverlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar w-64 p-4 flex flex-col">
            <div class="flex items-center gap-3 px-3 py-3 mb-6">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--primary);">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                </div>
                <div>
                    <h1 class="font-bold text-gray-900 text-sm">LMS Admin</h1>
                    <p class="text-gray-400 text-xs">Library Management</p>
                </div>
            </div>
            <nav class="flex-1 space-y-1">
                <a href="dashboard.html" class="sidebar-link"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
                <a href="books.html" class="sidebar-link"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>Manage Books</a>
                <a href="students.html" class="sidebar-link active"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>Students</a>
            </nav>
            <div class="border-t border-gray-100 pt-4 mt-4">
                <button onclick="Auth.logout()" class="sidebar-link danger w-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0">
            <header class="top-header">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-100 rounded-lg">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <div class="search-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" placeholder="What do you want to find?">
                </div>
                <div class="flex items-center gap-3">
                    <button class="p-2 hover:bg-gray-100 rounded-lg relative">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <div class="flex items-center gap-2 pl-3 border-l border-gray-200">
                        <div class="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background: var(--primary);">A</div>
                        <div class="hidden sm:block">
                            <p class="text-sm font-medium text-gray-900">Admin</p>
                            <p class="text-xs text-gray-400">Admin</p>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 p-6 lg:p-8">
                <div class="flex items-center justify-between mb-6 animate-fade-in">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">Student Management</h1>
                        <p class="text-gray-500 mt-1 text-sm">Home / Students</p>
                    </div>
                    <button onclick="openAddModal()" class="btn-primary flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Add Student
                    </button>
                </div>

                <div class="table-container animate-slide-up" style="animation-delay: 0.1s">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr>
                                    <th class="px-6 py-3 text-left"><input type="checkbox" class="custom-checkbox"></th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Name</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Student ID</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Email</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Phone</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Action</th>
                                </tr>
                            </thead>
                            <tbody id="studentsTable" class="divide-y divide-gray-50"></tbody>
                        </table>
                    </div>
                    <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between">
                        <p class="text-sm text-gray-500" id="pageInfo"></p>
                        <div class="pagination" id="pagination"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="studentModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                <h3 class="font-bold text-gray-900 text-lg">Add New Student</h3>
                <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="studentForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Full Name</label>
                    <input type="text" id="studentName" required placeholder="Enter student name">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Student ID</label>
                    <input type="text" id="studentSid" required placeholder="e.g. 666-61-37">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                    <input type="email" id="studentEmail" required placeholder="student@southern.ac.bd">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Phone</label>
                    <input type="text" id="studentPhone" placeholder="01XXXXXXXXX">
                </div>
                <div class="bg-purple-50 border border-purple-200 rounded-xl p-3 text-sm text-purple-700">
                    Login credentials: <strong>Student ID</strong> / <strong>student123</strong>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="btn-primary flex-1">Save Student</button>
                    <button type="button" onclick="closeModal()" class="btn-secondary flex-1">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="../js/store.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        if (!Auth.requireAuth('admin')) throw new Error('Unauthorized');

        let currentPage = 1;
        const rowsPerPage = 10;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mobileOverlay').classList.toggle('show');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast';
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        const thumbColors = ['#7C3AED', '#2563EB', '#059669', '#D97706', '#EC4899'];

        function renderStudents(students) {
            const tbody = document.getElementById('studentsTable');
            const totalPages = Math.ceil(students.length / rowsPerPage);
            const start = (currentPage - 1) * rowsPerPage;
            const pageStudents = students.slice(start, start + rowsPerPage);

            if (pageStudents.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-gray-400">No students registered.</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                document.getElementById('pageInfo').textContent = 'No results';
                return;
            }

            tbody.innerHTML = pageStudents.map(s => `<tr>
                <td class="px-6 py-3"><input type="checkbox" class="custom-checkbox"></td>
                <td class="px-6 py-3">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background: ${thumbColors[s.id % thumbColors.length]}">${s.name.charAt(0)}</div>
                        <span class="text-sm font-medium text-gray-900">${s.name}</span>
                    </div>
                </td>
                <td class="px-6 py-3"><span class="badge badge-purple">${s.studentId}</span></td>
                <td class="px-6 py-3 text-sm text-gray-600">${s.email}</td>
                <td class="px-6 py-3 text-sm text-gray-600">${s.phone || '-'}</td>
                <td class="px-6 py-3">
                    <button onclick="deleteStudent(${s.id})" class="p-1.5 hover:bg-red-50 rounded-lg text-gray-400 hover:text-red-500 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                </td>
            </tr>`).join('');

            document.getElementById('pageInfo').textContent = `Showing ${start + 1}-${Math.min(start + rowsPerPage, students.length)} of ${students.length}`;
            const pagination = document.getElementById('pagination');
            let html = `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>&laquo;</button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>&raquo;</button>`;
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            const students = Store.getStudents();
            const totalPages = Math.ceil(students.length / rowsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderStudents(students);
        }

        function loadStudents() { currentPage = 1; renderStudents(Store.getStudents()); }

        function openAddModal() {
            document.getElementById('studentForm').reset();
            document.getElementById('studentModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('studentModal').classList.add('hidden'); }

        function deleteStudent(id) {
            if (confirm('Are you sure you want to delete this student?')) {
                Store.deleteStudent(id);
                loadStudents();
                showToast('Student deleted successfully.');
            }
        }

        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            Store.addStudent({
                name: document.getElementById('studentName').value,
                studentId: document.getElementById('studentSid').value,
                email: document.getElementById('studentEmail').value,
                phone: document.getElementById('studentPhone').value
            });
            closeModal();
            loadStudents();
            showToast('Student added successfully.');
        });

        loadStudents();
    </script>
</body>
</html>

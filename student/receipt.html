<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrow Receipt - Library Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="mobileOverlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar w-64 p-4 flex flex-col">
            <div class="flex items-center gap-3 px-3 py-3 mb-6">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--primary);">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                </div>
                <div>
                    <h1 class="font-bold text-gray-900 text-sm">LMS Student</h1>
                    <p class="text-gray-400 text-xs">Library Portal</p>
                </div>
            </div>
            <nav class="flex-1 space-y-1">
                <a href="dashboard.html" class="sidebar-link"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
                <a href="books.html" class="sidebar-link"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>Available Books</a>
                <a href="borrowed.html" class="sidebar-link"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>My Borrowed Books</a>
                <a href="receipt.html" class="sidebar-link active"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Borrow Receipt</a>
            </nav>
            <div class="border-t border-gray-100 pt-4 mt-4">
                <button onclick="Auth.logout()" class="sidebar-link danger w-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0">
            <header class="top-header">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-100 rounded-lg">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <div class="search-box"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input type="text" placeholder="What do you want to find?"></div>
                <div class="flex items-center gap-3">
                    <button class="p-2 hover:bg-gray-100 rounded-lg relative">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <div class="flex items-center gap-2 pl-3 border-l border-gray-200">
                        <div class="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background: var(--primary);">S</div>
                        <div class="hidden sm:block"><p class="text-sm font-medium text-gray-900">Student</p><p class="text-xs text-gray-400">Student</p></div>
                    </div>
                </div>
            </header>

            <main class="flex-1 p-6 lg:p-8">
                <div class="mb-6 animate-fade-in">
                    <h1 class="text-2xl font-bold text-gray-900">Borrow Receipt</h1>
                    <p class="text-gray-500 mt-1 text-sm">Home / Borrow Receipt</p>
                </div>

                <div class="table-container animate-slide-up" style="animation-delay: 0.1s">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Receipt ID</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Book Title</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Borrow Date</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Return Date</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Status</th>
                                    <th class="px-6 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Action</th>
                                </tr>
                            </thead>
                            <tbody id="borrowsTable" class="divide-y divide-gray-50"></tbody>
                        </table>
                    </div>
                    <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between">
                        <p class="text-sm text-gray-500" id="pageInfo"></p>
                        <div class="pagination" id="pagination"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="../js/store.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        if (!Auth.requireAuth('student')) throw new Error('Unauthorized');
        const session = Auth.getSession();
        let currentPage = 1;
        const rowsPerPage = 10;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mobileOverlay').classList.toggle('show');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast';
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function renderBorrows(borrows) {
            const tbody = document.getElementById('borrowsTable');
            const totalPages = Math.ceil(borrows.length / rowsPerPage);
            const start = (currentPage - 1) * rowsPerPage;
            const pageBorrows = borrows.slice(start, start + rowsPerPage);

            if (pageBorrows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-gray-400">No borrow records found.</td></tr>';
                document.getElementById('pagination').innerHTML = '';
                document.getElementById('pageInfo').textContent = 'No results';
                return;
            }

            tbody.innerHTML = pageBorrows.map(b => `<tr>
                <td class="px-6 py-3 text-sm font-semibold text-gray-900">#R-${String(b.id).padStart(4, '0')}</td>
                <td class="px-6 py-3 text-sm text-gray-800">${b.bookTitle}</td>
                <td class="px-6 py-3 text-sm text-gray-500">${new Date(b.borrowDate).toLocaleDateString()}</td>
                <td class="px-6 py-3 text-sm text-gray-500">${new Date(b.returnDate).toLocaleDateString()}</td>
                <td class="px-6 py-3"><span class="badge ${b.status === 'borrowed' ? 'badge-orange' : 'badge-green'}">${b.status}</span></td>
                <td class="px-6 py-3">
                    <button onclick="downloadReceipt(${b.id})" class="btn-primary text-xs flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        Download PDF
                    </button>
                </td>
            </tr>`).join('');

            document.getElementById('pageInfo').textContent = `Showing ${start + 1}-${Math.min(start + rowsPerPage, borrows.length)} of ${borrows.length}`;
            const pagination = document.getElementById('pagination');
            let html = `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>&laquo;</button>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>&raquo;</button>`;
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            const borrows = Store.getBorrowsByStudent(session.studentId).sort((a, b) => new Date(b.borrowDate) - new Date(a.borrowDate));
            const totalPages = Math.ceil(borrows.length / rowsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderBorrows(borrows);
        }

        function loadBorrows() {
            currentPage = 1;
            renderBorrows(Store.getBorrowsByStudent(session.studentId).sort((a, b) => new Date(b.borrowDate) - new Date(a.borrowDate)));
        }

        function downloadReceipt(borrowId) {
            const borrows = Store.getBorrowsByStudent(session.studentId);
            const borrow = borrows.find(b => b.id === borrowId);
            if (!borrow) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFillColor(124, 58, 237);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(20);
            doc.setFont('helvetica', 'bold');
            doc.text('Library Management System', 105, 18, { align: 'center' });
            doc.setFontSize(11);
            doc.setFont('helvetica', 'normal');
            doc.text('Southern University Bangladesh', 105, 28, { align: 'center' });
            doc.text('Borrow Receipt', 105, 35, { align: 'center' });

            doc.setTextColor(0, 0, 0);
            const startY = 55;
            doc.setFontSize(14);
            doc.setFont('helvetica', 'bold');
            doc.text('Receipt Details', 20, startY);
            doc.setDrawColor(124, 58, 237);
            doc.setLineWidth(0.5);
            doc.line(20, startY + 3, 190, startY + 3);

            doc.setFontSize(11);
            const details = [
                ['Receipt ID:', '#R-' + String(borrow.id).padStart(4, '0')],
                ['Student Name:', session.name],
                ['Student ID:', session.studentId],
                ['Book Title:', borrow.bookTitle],
                ['Borrow Date:', new Date(borrow.borrowDate).toLocaleString()],
                ['Return Date:', new Date(borrow.returnDate).toLocaleString()],
                ['Status:', borrow.status.charAt(0).toUpperCase() + borrow.status.slice(1)]
            ];
            if (borrow.actualReturnDate) details.push(['Actual Return:', new Date(borrow.actualReturnDate).toLocaleString()]);

            details.forEach((d, i) => {
                const y = startY + 15 + (i * 12);
                doc.setFont('helvetica', 'bold');
                doc.text(d[0], 20, y);
                doc.setFont('helvetica', 'normal');
                doc.text(d[1], 75, y);
            });

            doc.setFontSize(9);
            doc.setTextColor(128, 128, 128);
            doc.text('This is a computer-generated receipt.', 105, 270, { align: 'center' });
            doc.text('Generated on: ' + new Date().toLocaleString(), 105, 275, { align: 'center' });

            doc.save('borrow-receipt-' + borrow.id + '.pdf');
            showToast('Receipt downloaded successfully!');
        }

        loadBorrows();
    </script>
</body>
</html>

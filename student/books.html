<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Books - Library Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="mobileOverlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar w-64 p-4 flex flex-col">
            <div class="flex items-center gap-3 px-3 py-3 mb-6">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--primary);">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                </div>
                <div>
                    <h1 class="font-bold text-gray-900 text-sm">LMS Student</h1>
                    <p class="text-gray-400 text-xs">Library Portal</p>
                </div>
            </div>
            <nav class="flex-1 space-y-1">
                <a href="dashboard.html" class="sidebar-link"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
                <a href="books.html" class="sidebar-link active"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>Available Books</a>
                <a href="borrowed.html" class="sidebar-link"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>My Borrowed Books</a>
                <a href="receipt.html" class="sidebar-link"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Borrow Receipt</a>
            </nav>
            <div class="border-t border-gray-100 pt-4 mt-4">
                <button onclick="Auth.logout()" class="sidebar-link danger w-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0">
            <header class="top-header">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-100 rounded-lg">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <div class="search-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" placeholder="What do you want to find?">
                </div>
                <div class="flex items-center gap-3">
                    <button class="p-2 hover:bg-gray-100 rounded-lg relative">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <div class="flex items-center gap-2 pl-3 border-l border-gray-200">
                        <div class="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background: var(--primary);">S</div>
                        <div class="hidden sm:block">
                            <p class="text-sm font-medium text-gray-900">Student</p>
                            <p class="text-xs text-gray-400">Student</p>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 p-6 lg:p-8">
                <div class="mb-6 animate-fade-in">
                    <h1 class="text-2xl font-bold text-gray-900">Available Books</h1>
                    <p class="text-gray-500 mt-1 text-sm">Home / Available Books</p>
                </div>

                <!-- Search -->
                <div class="mb-6 animate-slide-up" style="animation-delay: 0.1s">
                    <div class="relative max-w-md">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        <input type="text" id="searchInput" placeholder="Search by name or id..."
                            class="pl-10 w-full" oninput="filterBooks()">
                    </div>
                </div>

                <!-- Books Grid -->
                <div id="booksGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>

                <div id="noBooks" class="hidden text-center py-16 animate-fade-in">
                    <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    <p class="text-gray-400 text-lg font-medium">No books found.</p>
                </div>
            </main>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="../js/store.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        if (!Auth.requireAuth('student')) throw new Error('Unauthorized');
        const session = Auth.getSession();

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mobileOverlay').classList.toggle('show');
        }

        function showToast(message, isError) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = isError ? 'toast toast-error' : 'toast';
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        const thumbColors = ['#7C3AED', '#2563EB', '#059669', '#D97706', '#EC4899'];

        function renderBooks(books) {
            const grid = document.getElementById('booksGrid');
            const noBooks = document.getElementById('noBooks');

            if (books.length === 0) {
                grid.innerHTML = '';
                noBooks.classList.remove('hidden');
                return;
            }

            noBooks.classList.add('hidden');
            const categoryColors = {
                'Computer Science': 'badge-purple',
                'Mathematics': 'badge-blue',
                'Science': 'badge-green',
                'Software Engineering': 'badge-orange',
                'Literature': 'badge-pink',
                'Others': 'badge-gray'
            };

            grid.innerHTML = books.map((b, i) => {
                const canBorrow = b.available > 0;
                return `<div class="bg-white rounded-2xl border border-gray-100 p-5 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300 animate-slide-up" style="animation-delay: ${0.1 + i * 0.03}s">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="book-thumb" style="background: ${thumbColors[b.id % thumbColors.length]}">${b.title.charAt(0)}</div>
                            <div>
                                <h3 class="font-bold text-gray-900 text-sm leading-tight">${b.title}</h3>
                                <p class="text-xs text-gray-500 mt-0.5">by ${b.author}</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center justify-between mb-4">
                        <span class="badge ${categoryColors[b.category] || 'badge-gray'}">${b.category}</span>
                        <span class="text-xs font-semibold ${canBorrow ? 'text-emerald-600' : 'text-red-500'}">${b.available} left</span>
                    </div>
                    <button onclick="borrowBook(${b.id})" ${!canBorrow ? 'disabled' : ''}
                        class="w-full ${canBorrow ? 'btn-primary' : 'bg-gray-100 text-gray-400 cursor-not-allowed font-semibold py-2.5 rounded-xl text-sm'}">
                        ${canBorrow ? 'Borrow Book' : 'Not Available'}
                    </button>
                </div>`;
            }).join('');
        }

        function loadBooks() { renderBooks(Store.getBooks()); }

        function filterBooks() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            renderBooks(Store.getBooks().filter(b =>
                b.title.toLowerCase().includes(query) ||
                b.author.toLowerCase().includes(query) ||
                b.category.toLowerCase().includes(query)
            ));
        }

        function borrowBook(bookId) {
            const result = Store.borrowBook(session.studentId, bookId);
            if (result) {
                showToast('Book borrowed! Due: ' + new Date(result.returnDate).toLocaleDateString());
                loadBooks();
            } else {
                showToast('Failed to borrow book.', true);
            }
        }

        loadBooks();
    </script>
</body>
</html>
